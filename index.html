<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FinanceFlow Pro | Control Contable Real</title>
    
    <!-- Configuración para Apple Web App -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FinanceFlow">
    
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" href="apple-touch-icon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white !important; }
            .print-card { border: 1px solid #e2e8f0 !important; box-shadow: none !important; border-radius: 0 !important; padding: 20px !important; }
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .action-btn-red { background-color: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
        .action-btn-blue { background-color: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }
        .btn-action-size { width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; border-radius: 12px; transition: all 0.2s; }
        
        .chart-bar-container { height: 200px; display: flex; align-items: flex-end; gap: 12px; }
        .chart-bar { 
            width: 100%; 
            background: linear-gradient(to top, #4f46e5, #818cf8);
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
            transition: height 1s ease-out;
            min-height: 4px;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 text-left">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const Icon = ({ name, className = "w-5 h-5" }) => {
            useEffect(() => { if(window.lucide) window.lucide.createIcons(); });
            return <i data-lucide={name} className={className}></i>;
        };

        const Toast = ({ message, type, onClose }) => {
            useEffect(() => {
                const timer = setTimeout(onClose, 3000);
                return () => clearTimeout(timer);
            }, [onClose]);
            return (
                <div className="fixed bottom-6 right-6 z-[100] flex items-center gap-3 px-6 py-4 rounded-2xl shadow-2xl animate-in bg-slate-900 text-white border border-slate-700 text-left">
                    <Icon name={type === 'success' ? 'check-circle' : 'info'} className={type === 'success' ? 'text-emerald-400' : 'text-blue-400'} />
                    <span className="font-medium text-sm">{message}</span>
                </div>
            );
        };

        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isSidebarCollapsed, setIsSidebarCollapsed] = useState(false);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [toast, setToast] = useState(null);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [formData, setFormData] = useState({ type: 'expense', category: '', amount: '', date: new Date().toISOString().split('T')[0] });

            // Carga inicial y Reinicio Mensual (Día 1)
            const [transactions, setTransactions] = useState(() => {
                const saved = localStorage.getItem('ff_pro_real_v15');
                const lastResetMonth = localStorage.getItem('ff_last_reset_v15');
                const now = new Date();
                const currentMonthKey = `${now.getFullYear()}-${now.getMonth()}`;
                
                let data = saved ? JSON.parse(saved) : [];

                if (lastResetMonth && lastResetMonth !== currentMonthKey) {
                    data = data.filter(t => t.type === 'fixed').map(t => ({ ...t, isPaid: false }));
                    localStorage.setItem('ff_last_reset_v15', currentMonthKey);
                } else if (!lastResetMonth) {
                    localStorage.setItem('ff_last_reset_v15', currentMonthKey);
                }
                return data;
            });

            useEffect(() => {
                localStorage.setItem('ff_pro_real_v15', JSON.stringify(transactions));
                if(window.lucide) window.lucide.createIcons();
            }, [transactions, activeTab, isSidebarCollapsed, isModalOpen]);

            const showToast = (message, type = 'success') => setToast({ message, type });

            // CÁLCULOS DINÁMICOS
            const stats = useMemo(() => {
                const income = transactions.filter(t => t.type === 'income').reduce((acc, t) => acc + Number(t.amount), 0);
                const fixed = transactions.filter(t => t.type === 'fixed');
                const variable = transactions.filter(t => t.type === 'expense').reduce((acc, t) => acc + Number(t.amount), 0);
                const savings = transactions.filter(t => t.type === 'saving').reduce((acc, t) => acc + Number(t.amount), 0);

                const totalFixed = fixed.reduce((acc, t) => acc + Number(t.amount), 0);
                const paidFixed = fixed.filter(t => t.isPaid).reduce((acc, t) => acc + Number(t.amount), 0);
                const pendingFixed = totalFixed - paidFixed;
                
                const realBalance = income - (paidFixed + variable + savings);
                const projectedBalance = income - (totalFixed + variable + savings);

                // Lógica de Calendario dinámica para el divisor
                const now = new Date();
                const totalDaysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
                const currentDay = now.getDate();
                const divisor = totalDaysInMonth - currentDay;

                // Fórmula: Saldo Proyectado / (Días totales - Días actuales)
                // Se protege división por cero si es el último día del mes
                const dailyLimit = divisor > 0 && projectedBalance > 0 ? (projectedBalance / divisor) : (projectedBalance > 0 ? projectedBalance : 0);

                return { income, totalFixed, paidFixed, pendingFixed, variable, savings, realBalance, projectedBalance, dailyLimit, divisor };
            }, [transactions]);

            const handleSave = (e) => {
                e.preventDefault();
                if (!formData.amount || !formData.category) return;
                if (editingId) {
                    setTransactions(prev => prev.map(t => t.id === editingId ? { ...t, ...formData, amount: Number(formData.amount) } : t));
                    showToast("Registro actualizado");
                } else {
                    const item = { ...formData, id: Date.now(), amount: Number(formData.amount), isPaid: formData.type === 'income' };
                    setTransactions(prev => [...prev, item]);
                    showToast("Registro guardado");
                }
                setIsModalOpen(false);
                setEditingId(null);
            };

            const togglePaid = (id) => {
                setTransactions(prev => prev.map(t => t.id === id ? { ...t, isPaid: !t.isPaid } : t));
            };

            const handleDelete = (id) => {
                setTransactions(prev => prev.filter(t => t.id !== id));
                showToast("Registro eliminado", "info");
            };

            const menuItems = [
                { id: 'dashboard', label: 'Dashboard', icon: 'layout-dashboard' },
                { id: 'income', label: 'Ingresos', icon: 'trending-up' },
                { id: 'fixed', label: 'Gastos Fijos', icon: 'calendar-check' },
                { id: 'expense', label: 'Variables', icon: 'shopping-bag' },
                { id: 'saving', label: 'Ahorros', icon: 'piggy-bank' },
                { id: 'projections', label: 'Proyecciones de Ahorro', icon: 'line-chart' },
                { id: 'report', label: 'Cierre de Mes', icon: 'file-text' },
            ];

            return (
                <div className="flex h-screen overflow-hidden text-left">
                    <aside className={`no-print hidden md:flex flex-col bg-slate-950 text-white transition-all duration-300 relative ${isSidebarCollapsed ? 'w-20' : 'w-72'}`}>
                        <button onClick={() => setIsSidebarCollapsed(!isSidebarCollapsed)} className="absolute -right-3 top-10 bg-indigo-600 text-white rounded-full p-1.5 shadow-xl z-50">
                            <Icon name={isSidebarCollapsed ? "chevron-right" : "chevron-left"} className="w-4 h-4" />
                        </button>
                        <div className="p-8 mb-4 flex items-center gap-3">
                            <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shrink-0 shadow-lg"><Icon name="briefcase" className="text-white w-5 h-5" /></div>
                            {!isSidebarCollapsed && <h1 className="text-lg font-black tracking-tight leading-none uppercase">FinanceFlow</h1>}
                        </div>
                        <nav className="flex-1 px-4 space-y-1">
                            {menuItems.map(item => (
                                <button key={item.id} onClick={() => setActiveTab(item.id)} className={`w-full flex items-center gap-4 p-4 rounded-2xl transition-all ${activeTab === item.id ? 'bg-indigo-600 text-white shadow-xl' : 'text-slate-500 hover:text-white hover:bg-slate-900'} ${isSidebarCollapsed ? 'justify-center' : ''}`}>
                                    <Icon name={item.icon} /> {!isSidebarCollapsed && <span className="font-bold text-xs uppercase tracking-wider">{item.label}</span>}
                                </button>
                            ))}
                        </nav>
                        <div className="p-6">
                            <div className={`bg-slate-900 rounded-2xl p-4 border border-slate-800 ${isSidebarCollapsed ? 'p-2 flex justify-center' : ''}`}>
                                <Icon name="activity" className={stats.realBalance >= 0 ? 'text-emerald-400' : 'text-rose-400'} />
                                {!isSidebarCollapsed && <p className="mt-2 text-[9px] font-black text-slate-500 uppercase">Saldo Real</p>}
                                {!isSidebarCollapsed && <p className="text-xl font-black text-white">${stats.realBalance.toLocaleString()}</p>}
                            </div>
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col min-w-0 overflow-hidden bg-slate-50">
                        <header className="no-print bg-white/80 backdrop-blur-md border-b border-slate-200 px-6 py-4 flex justify-between items-center shrink-0 z-40">
                            <div className="flex items-center gap-4">
                                <button onClick={() => setIsMobileMenuOpen(true)} className="md:hidden p-2 text-slate-600"><Icon name="menu" /></button>
                                <h2 className="text-xs font-black text-slate-400 uppercase tracking-[0.2em]">{menuItems.find(i => i.id === activeTab).label}</h2>
                            </div>
                            <button onClick={() => { setEditingId(null); setFormData({ type: 'expense', category: '', amount: '', date: new Date().toISOString().split('T')[0] }); setIsModalOpen(true); }} className="bg-indigo-600 text-white px-5 py-2.5 rounded-xl flex items-center gap-2 text-xs font-bold shadow-lg shadow-indigo-100 active:scale-95 transition-all"><Icon name="plus" className="w-4 h-4" /> <span>Añadir</span></button>
                        </header>

                        <div className="flex-1 overflow-y-auto p-4 md:p-8 custom-scrollbar">
                            <div className="max-w-5xl mx-auto">
                                {activeTab === 'dashboard' && <Dashboard stats={stats} transactions={transactions} onEdit={(t) => { setEditingId(t.id); setFormData({ ...t, amount: t.amount.toString() }); setIsModalOpen(true); }} onDelete={handleDelete} onToggle={togglePaid} />}
                                {activeTab === 'projections' && <ProjectionsView stats={stats} />}
                                {activeTab !== 'dashboard' && activeTab !== 'report' && activeTab !== 'projections' && (
                                    <DataList 
                                        title={menuItems.find(i => i.id === activeTab).label} 
                                        data={transactions.filter(t => t.type === activeTab)} 
                                        isFixed={activeTab === 'fixed'}
                                        onEdit={(t) => { setEditingId(t.id); setFormData({ ...t, amount: t.amount.toString() }); setIsModalOpen(true); }} 
                                        onDelete={handleDelete} 
                                        onToggle={togglePaid}
                                    />
                                )}
                                {activeTab === 'report' && <ReportView stats={stats} transactions={transactions} />}
                            </div>
                        </div>
                    </main>

                    {isModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={() => setIsModalOpen(false)}></div>
                            <div className="bg-white rounded-[2rem] p-8 w-full max-w-lg shadow-2xl relative animate-in border border-slate-100 text-left text-left text-left">
                                <h3 className="text-xl font-black text-slate-800 mb-6 uppercase tracking-tight text-left">{editingId ? 'Editar' : 'Nueva'} Operación</h3>
                                <form onSubmit={handleSave} className="space-y-5 text-left">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="col-span-2 sm:col-span-1">
                                            <label className="block text-[10px] font-black text-slate-400 uppercase mb-2">Tipo</label>
                                            <select value={formData.type} onChange={(e) => setFormData({...formData, type: e.target.value})} className="w-full bg-slate-50 rounded-xl p-4 font-bold text-slate-700 outline-none focus:ring-2 focus:ring-indigo-600 transition-all border-none ring-1 ring-slate-200 text-left">
                                                <option value="income">Ingreso</option><option value="fixed">Gasto Fijo</option><option value="expense">Gasto Variable</option><option value="saving">Ahorro</option>
                                            </select>
                                        </div>
                                        <div className="col-span-2 sm:col-span-1 text-left">
                                            <label className="block text-[10px] font-black text-slate-400 uppercase mb-2">Monto ($)</label>
                                            <input type="number" step="0.01" required value={formData.amount} onChange={(e) => setFormData({...formData, amount: e.target.value})} className="w-full bg-slate-50 rounded-xl p-4 font-black text-lg text-indigo-600 ring-1 ring-slate-200 border-none transition-all" />
                                        </div>
                                    </div>
                                    <div className="col-span-2 text-left">
                                        <label className="block text-[10px] font-black text-slate-400 uppercase mb-2">Concepto</label>
                                        <input type="text" required value={formData.category} onChange={(e) => setFormData({...formData, category: e.target.value})} className="w-full bg-slate-50 rounded-xl p-4 font-bold outline-none focus:ring-2 focus:ring-indigo-600 ring-1 ring-slate-200 border-none transition-all" />
                                    </div>
                                    <button type="submit" className="w-full bg-indigo-600 text-white p-5 rounded-xl font-black text-sm uppercase tracking-widest shadow-xl shadow-indigo-100 hover:bg-indigo-700 active:scale-95 transition-all">
                                        {editingId ? 'Guardar Cambios' : 'Confirmar Registro'}
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}
                    
                    {isMobileMenuOpen && (
                        <div className="fixed inset-0 z-[60] md:hidden bg-slate-950 p-8 animate-in text-white text-left">
                            <div className="flex justify-between items-center mb-12"><h1 className="text-2xl font-black uppercase tracking-tighter">Menu</h1><button onClick={() => setIsMobileMenuOpen(false)}><Icon name="x" className="w-8 h-8" /></button></div>
                            <nav className="space-y-4">
                                {menuItems.map(item => (
                                    <button key={item.id} onClick={() => { setActiveTab(item.id); setIsMobileMenuOpen(false); }} className={`w-full flex items-center gap-6 p-5 rounded-3xl text-lg font-black uppercase ${activeTab === item.id ? 'bg-indigo-600' : 'text-slate-600'}`}><Icon name={item.icon} className="w-6 h-6" /> {item.label}</button>
                                ))}
                            </nav>
                        </div>
                    )}
                    {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
                </div>
            );
        }

        // --- COMPONENTE DASHBOARD ---
        function Dashboard({ stats, transactions, onEdit, onDelete, onToggle }) {
            const fixedItems = transactions.filter(t => t.type === 'fixed');
            return (
                <div className="space-y-8 animate-in text-left">
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                        <KPICard title="Presupuesto Diario Hoy" value={stats.dailyLimit} color="indigo" icon="zap" highlight />
                        <KPICard title="Saldo Líquido Actual" value={stats.realBalance} color="emerald" icon="wallet" />
                        <KPICard title="Ingresos Totales" value={stats.income} color="blue" icon="arrow-up-right" />
                        <KPICard title="Saldo Proyectado Final" value={stats.projectedBalance} color="purple" icon="target" />
                    </div>
                    
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div className="lg:col-span-2 bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-sm text-left overflow-hidden">
                            <h3 className="text-xs font-black text-slate-400 uppercase tracking-[0.2em] mb-8 text-left">Gestión de Gastos Fijos</h3>
                            <div className="space-y-4 text-left">
                                {fixedItems.map(t => (
                                    <div key={t.id} className="flex flex-col sm:flex-row sm:items-center justify-between p-5 bg-slate-50 rounded-2xl border border-slate-100 gap-4 group">
                                        <div className="flex items-center gap-4 text-left">
                                            <button onClick={() => onToggle(t.id)} className={`w-11 h-11 rounded-2xl border-2 flex items-center justify-center transition-all ${t.isPaid ? 'bg-emerald-500 border-emerald-500 text-white shadow-lg shadow-emerald-100' : 'bg-white border-slate-200'}`}><Icon name="check" /></button>
                                            <span className={`font-bold text-sm ${t.isPaid ? 'text-slate-400 line-through' : 'text-slate-700'}`}>{t.category}</span>
                                        </div>
                                        <div className="flex items-center gap-4">
                                            <span className="font-black text-sm text-slate-900">${t.amount.toLocaleString()}</span>
                                            <div className="flex gap-2 no-print">
                                                <button onClick={() => onEdit(t)} className="btn-action-size action-btn-blue shadow-sm"><Icon name="edit-3" className="w-4 h-4" /></button>
                                                <button onClick={() => onDelete(t.id)} className="btn-action-size action-btn-red shadow-sm"><Icon name="trash-2" className="w-4 h-4" /></button>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                                {fixedItems.length === 0 && <p className="text-slate-300 text-sm italic text-center py-10">Sin gastos fijos registrados.</p>}
                            </div>
                        </div>
                        <div className="bg-white p-8 rounded-[2rem] border border-slate-200 shadow-sm flex flex-col text-left text-left">
                            <h3 className="text-xs font-black text-slate-400 uppercase tracking-[0.2em] mb-8 text-left">Distribución Mensual</h3>
                            <Metric label="Fijos (Obligaciones)" value={stats.totalFixed} total={stats.income} color="bg-indigo-500" />
                            <Metric label="Variables (Día a Día)" value={stats.variable} total={stats.income} color="bg-orange-500" />
                            <Metric label="Ahorro Realizado" value={stats.savings} total={stats.income} color="bg-purple-500" />
                            <div className="mt-auto pt-8 border-t border-slate-50 text-left text-left">
                                <p className="text-[10px] font-black text-slate-400 uppercase mb-2">Saldo Final de Supervivencia</p>
                                <p className={`text-2xl font-black ${stats.projectedBalance >= 0 ? 'text-indigo-600' : 'text-rose-600'} text-left text-left text-left text-left`}>${stats.projectedBalance.toLocaleString()}</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- VISTA DE PROYECCIONES ---
        function ProjectionsView({ stats }) {
            const monthlySaving = stats.savings || 0;
            const periods = [
                { label: '6 Meses', months: 6 },
                { label: '1 Año', months: 12 },
                { label: '2 Años', months: 24 },
                { label: '3 Años', months: 36 }
            ];

            const projections = periods.map(p => monthlySaving * p.months);
            const maxVal = Math.max(...projections, 1);

            return (
                <div className="animate-in space-y-8 text-left">
                    <div className="bg-slate-900 rounded-[2.5rem] p-10 text-white shadow-xl relative overflow-hidden">
                        <div className="relative z-10 text-left text-left">
                            <h3 className="text-xs font-black uppercase tracking-[0.2em] text-indigo-400 mb-2">Potencial de Ahorro Mensual</h3>
                            <p className="text-4xl font-black">${monthlySaving.toLocaleString()}</p>
                            <p className="text-sm mt-4 text-slate-400 max-w-md italic">Cálculos lineales basados en tu comportamiento de ahorro actual.</p>
                        </div>
                        <Icon name="trending-up" className="absolute right-[-20px] bottom-[-20px] w-64 h-64 text-indigo-500 opacity-10" />
                    </div>

                    <div className="bg-white p-10 rounded-[2.5rem] border border-slate-200 shadow-sm text-left">
                        <h3 className="text-xs font-black text-slate-400 uppercase tracking-[0.2em] mb-12">Visualización de Crecimiento</h3>
                        
                        <div className="chart-bar-container text-left text-left text-left">
                            {periods.map((p, i) => {
                                const height = (projections[i] / maxVal) * 100;
                                return (
                                    <div key={p.months} className="flex-1 flex flex-col items-center gap-4 group text-left">
                                        <div className="bg-slate-800 text-white text-[10px] font-black px-2 py-1 rounded-md opacity-0 group-hover:opacity-100 transition-opacity">
                                            ${projections[i].toLocaleString()}
                                        </div>
                                        <div 
                                            className="chart-bar w-full shadow-lg shadow-indigo-100" 
                                            style={{ height: `${Math.max(height, 5)}%` }}
                                        ></div>
                                        <span className="text-[10px] font-black text-slate-500 uppercase tracking-tighter">{p.label}</span>
                                    </div>
                                );
                            })}
                        </div>

                        <div className="mt-16 grid grid-cols-1 sm:grid-cols-2 gap-6 pt-10 border-t border-slate-50 text-left text-left text-left">
                            <div className="p-8 bg-indigo-50 rounded-3xl border border-indigo-100 text-left">
                                <p className="text-[10px] font-black text-indigo-600 uppercase mb-2">Meta a 12 meses</p>
                                <p className="text-2xl font-black text-indigo-900">${(monthlySaving * 12).toLocaleString()}</p>
                            </div>
                            <div className="p-8 bg-slate-50 rounded-3xl border border-slate-200 text-left">
                                <p className="text-[10px] font-black text-slate-500 uppercase mb-2">Meta a 36 meses</p>
                                <p className="text-2xl font-black text-slate-800">${(monthlySaving * 36).toLocaleString()}</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function DataList({ title, data, isFixed, onEdit, onDelete, onToggle }) {
            return (
                <div className="animate-in space-y-6 text-left">
                    <h3 className="text-2xl font-black tracking-tight text-left">{title}</h3>
                    <div className="bg-white rounded-[2.5rem] border border-slate-200 shadow-sm overflow-x-auto text-left">
                        <table className="w-full text-left min-w-[600px] text-left">
                            <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-100 text-left">
                                <tr>{isFixed && <th className="px-8 py-5 w-24 text-center">Pago</th>}<th className="px-8 py-5 text-left">Concepto</th><th className="px-8 py-5 text-center text-left">Fecha</th><th className="px-8 py-5 text-right text-right text-right">Monto</th><th className="px-8 py-5 text-center w-48 text-left text-left">Acciones</th></tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100 text-sm text-left">
                                {data.map(t => (
                                    <tr key={t.id} className={`hover:bg-slate-50/50 transition-all ${isFixed && t.isPaid ? 'opacity-60 bg-slate-50/30' : ''}`}>
                                        {isFixed && (<td className="px-8 py-5 text-center text-left text-left"><button onClick={() => onToggle(t.id)} className={`w-10 h-10 rounded-2xl border-2 flex items-center justify-center transition-all ${t.isPaid ? 'bg-emerald-500 border-emerald-500 text-white shadow-lg' : 'border-slate-200'}`}><Icon name="check" /></button></td>)}
                                        <td className={`px-8 py-5 font-bold ${isFixed && t.isPaid ? 'line-through text-slate-400' : 'text-slate-800'} text-left text-left`}>{t.category}</td>
                                        <td className="px-8 py-5 text-center text-slate-500 text-left">{t.date}</td>
                                        <td className="px-8 py-5 text-right font-black text-slate-900 text-right text-right text-right">${t.amount.toLocaleString()}</td>
                                        <td className="px-8 py-5 text-left text-left text-left"><div className="flex justify-center gap-3 text-left"><button onClick={() => onEdit(t)} className="action-icon-size btn-action-blue shadow-sm"><Icon name="edit-3" /></button><button onClick={() => onDelete(t.id)} className="action-icon-size btn-action-red shadow-sm"><Icon name="trash-2" /></button></div></td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        function ReportView({ stats, transactions }) {
            const currentMonthName = new Date().toLocaleDateString('es-ES', { month: 'long', year: 'numeric' });
            const incomeItems = transactions.filter(t => t.type === 'income');
            const fixedItems = transactions.filter(t => t.type === 'fixed');
            const variableItems = transactions.filter(t => t.type === 'expense');
            const savingItems = transactions.filter(t => t.type === 'saving');

            return (
                <div className="animate-in pb-12 text-left">
                    <div className="print-card bg-white p-12 md:p-16 rounded-[3rem] border border-slate-200 shadow-xl relative overflow-hidden text-left text-left">
                        <div className="absolute top-0 left-0 w-full h-3 bg-indigo-600 no-print text-left text-left"></div>
                        <div className="flex flex-col md:flex-row justify-between items-start border-b-2 border-slate-100 pb-10 mb-12 text-left gap-6 text-left">
                            <div><h1 className="text-4xl font-black text-slate-950 uppercase tracking-tighter leading-tight text-left">Cierre Mensual</h1><p className="text-lg font-bold text-indigo-600 uppercase tracking-[0.2em] mt-2 text-left text-left">{currentMonthName}</p></div>
                            <div className="text-left md:text-right flex flex-col gap-1 text-left text-left text-left">
                                <span className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] text-left text-left">Ref Documental</span>
                                <p className="text-sm font-bold text-slate-900 text-left text-left">FF-{Date.now().toString().slice(-8)}</p>
                                <p className="text-xs text-slate-400 font-bold">{new Date().toLocaleDateString()}</p>
                            </div>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12 text-left text-left">
                            <div className="p-8 bg-emerald-50 rounded-[2rem] text-left text-left"><p className="text-[10px] font-black uppercase text-emerald-600 mb-1">Total Ingresos</p><p className="text-3xl font-black text-left">${stats.income.toLocaleString()}</p></div>
                            <div className="p-8 bg-rose-50 rounded-[2rem] text-left text-left text-left"><p className="text-[10px] font-black uppercase text-rose-600 mb-1">Total Gastos</p><p className="text-3xl font-black text-left">${(stats.totalFixed + stats.variable + stats.savings).toLocaleString()}</p></div>
                            <div className="p-8 bg-slate-950 text-white rounded-[2rem] shadow-2xl text-left text-left text-left text-left text-left"><p className="text-[10px] font-black uppercase text-slate-400 mb-1">Saldo Real</p><p className="text-3xl font-black text-left">${stats.realBalance.toLocaleString()}</p></div>
                        </div>
                        <div className="space-y-12 text-left text-left text-left">
                            <ReportItem title="Entradas de Dinero" items={incomeItems} />
                            <ReportItem title="Obligaciones Fijas" items={fixedItems} isFixed />
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-12 text-left text-left text-left text-left text-left text-left text-left text-left"><ReportItem title="Gastos Variables" items={variableItems} /><ReportItem title="Ahorro Real" items={savingItems} /></div>
                        </div>
                    </div>
                </div>
            );
        }

        function ReportItem({ title, items, isFixed }) {
            const total = items.reduce((acc, t) => acc + t.amount, 0);
            return (
                <section className="text-left text-left text-left text-left text-left">
                    <h5 className="text-[10px] font-black text-slate-900 uppercase border-b-2 border-slate-100 pb-3 mb-6 flex justify-between tracking-[0.2em] text-left text-left">
                        <span>{title}</span><span className="text-indigo-600 font-black text-left text-left">${total.toLocaleString()}</span>
                    </h5>
                    <div className="space-y-3 text-left">
                        {items.map(item => (
                            <div key={item.id} className="flex justify-between text-xs py-1 border-b border-slate-50 text-left text-left">
                                <span className={`font-semibold ${isFixed && !item.isPaid ? 'text-rose-500' : 'text-slate-600'} text-left text-left text-left text-left`}>{item.category} {isFixed && <span className="text-[9px] font-black ml-1 text-left text-left text-left">[{item.isPaid ? 'LIQUIDADO' : 'PTE'}]</span>}</span>
                                <span className="font-black text-slate-900 text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left">${item.amount.toLocaleString()}</span>
                            </div>
                        ))}
                    </div>
                </section>
            );
        }

        function KPICard({ title, value, color, icon, highlight }) {
            const colors = { indigo: "bg-indigo-600 text-white shadow-xl shadow-indigo-200 border-transparent", emerald: "bg-white text-slate-900 border-slate-200", blue: "bg-white text-slate-900 border-slate-200", purple: "bg-white text-slate-900 border-slate-200", amber: "bg-white text-slate-900 border-slate-200" };
            const iconColors = { indigo: "bg-indigo-500 text-white shadow-sm", emerald: "bg-emerald-50 text-emerald-600", blue: "bg-blue-50 text-blue-600", purple: "bg-purple-50 text-purple-600", amber: "bg-amber-50 text-amber-600" };
            return (
                <div className={`${colors[color]} p-6 rounded-[2rem] border shadow-sm flex flex-col gap-5 transition-all text-left text-left text-left text-left text-left text-left text-left text-left text-left`}>
                    <div className={`w-14 h-14 rounded-2xl flex items-center justify-center border shrink-0 ${iconColors[color]} shadow-sm`}><Icon name={icon} className="w-6 h-6" /></div>
                    <div className="text-left text-left text-left text-left">
                        <p className={`text-[10px] font-black uppercase tracking-widest leading-none mb-1 text-left text-left text-left text-left ${highlight ? 'text-indigo-100' : 'text-slate-400'}`}>{title}</p>
                        <p className="text-2xl font-black tracking-tight text-left text-left text-left text-left text-left text-left">${value.toLocaleString()}</p>
                    </div>
                </div>
            );
        }

        function Metric({ label, value, total, color }) {
            const p = total > 0 ? Math.min((value / total) * 100, 100) : 0;
            return (
                <div className="space-y-3 mb-8 last:mb-0 text-left text-left text-left text-left">
                    <div className="flex justify-between text-[10px] font-black text-slate-500 uppercase tracking-tighter text-left text-left text-left text-left text-left text-left text-left"><span>{label}</span><span>{p.toFixed(0)}%</span></div>
                    <div className="h-3 bg-slate-100 rounded-full overflow-hidden p-0.5 text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left"><div className={`h-full rounded-full ${color} transition-all duration-1000 shadow-sm text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left`} style={{ width: `${p}%` }}></div></div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
