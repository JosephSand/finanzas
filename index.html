<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceFlow Pro | Gestión Personal</title>
    <!-- Tailwind CSS para Estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y Babel para ejecución en navegador -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 5px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }
        
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        const { 
            LayoutDashboard, Wallet, Receipt, Lock, TrendingUp, Plus, 
            Trash2, PieChart, ArrowUpCircle, ArrowDownCircle, PiggyBank,
            ChevronLeft, Menu, X, CheckCircle2, AlertCircle, ChevronRight
        } = lucide;

        // --- Componentes de UI ---

        const Toast = ({ message, type, onClose }) => {
            useEffect(() => {
                const timer = setTimeout(onClose, 3000);
                return () => clearTimeout(timer);
            }, [onClose]);

            return (
                <div className={`fixed bottom-6 right-6 z-[100] flex items-center gap-3 px-6 py-4 rounded-2xl shadow-2xl animate-fade-in ${
                    type === 'success' ? 'bg-emerald-600 text-white' : 'bg-slate-800 text-white'
                }`}>
                    <i data-lucide={type === 'success' ? 'check-circle-2' : 'alert-circle'} className="w-5 h-5"></i>
                    <span className="font-medium">{message}</span>
                </div>
            );
        };

        const KPICard = ({ title, value, iconName, color }) => {
            const colors = {
                emerald: "bg-emerald-50 text-emerald-600 border-emerald-100",
                rose: "bg-rose-50 text-rose-600 border-rose-100",
                blue: "bg-blue-50 text-blue-600 border-blue-100",
                purple: "bg-purple-50 text-purple-600 border-purple-100",
            };
            return (
                <div className="bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm flex flex-col gap-4 group hover:border-indigo-200 transition-all">
                    <div className={`w-12 h-12 rounded-2xl flex items-center justify-center border shrink-0 ${colors[color]}`}>
                        <i data-lucide={iconName} className="w-6 h-6"></i>
                    </div>
                    <div>
                        <p className="text-xs font-black text-slate-400 uppercase tracking-widest">{title}</p>
                        <p className="text-2xl font-black text-slate-900 mt-1">
                            {typeof value === 'number' ? `$${value.toLocaleString()}` : value}
                        </p>
                    </div>
                </div>
            );
        };

        const PresupuestoBar = ({ label, value, total, color }) => {
            const perc = total > 0 ? Math.min((value / total) * 100, 100) : 0;
            return (
                <div className="space-y-3">
                    <div className="flex justify-between items-end">
                        <div>
                            <p className="text-sm font-black text-slate-800">{label}</p>
                            <p className="text-xs text-slate-400 font-bold tracking-tight">${value.toLocaleString()} gastados</p>
                        </div>
                        <span className="text-sm font-black text-indigo-600">{perc.toFixed(0)}%</span>
                    </div>
                    <div className="h-4 bg-slate-100 rounded-full overflow-hidden p-1">
                        <div className={`h-full rounded-full ${color} transition-all duration-1000`} style={{ width: `${perc}%` }}></div>
                    </div>
                </div>
            );
        };

        // --- App Principal ---

        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isSidebarCollapsed, setIsSidebarCollapsed] = useState(false);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [toast, setToast] = useState(null);
            
            // Cargar datos iniciales de LocalStorage
            const [transactions, setTransactions] = useState(() => {
                const saved = localStorage.getItem('financeflow_data');
                return saved ? JSON.parse(saved) : [
                    { id: 1, type: 'income', category: 'Salario', amount: 3500, date: '2023-10-01', description: 'Nómina principal' },
                    { id: 2, type: 'fixed', category: 'Alquiler', amount: 1200, date: '2023-10-02', description: 'Renta mensual' },
                    { id: 3, type: 'expense', category: 'Supermercado', amount: 150, date: '2023-10-10', description: 'Compra semanal' }
                ];
            });

            const [isModalOpen, setIsModalOpen] = useState(false);
            const [newTransaction, setNewTransaction] = useState({
                type: 'expense',
                category: '',
                amount: '',
                description: '',
                date: new Date().toISOString().split('T')[0]
            });

            // Guardar en LocalStorage cada vez que cambien las transacciones
            useEffect(() => {
                localStorage.setItem('financeflow_data', JSON.stringify(transactions));
                lucide.createIcons(); // Refrescar iconos cuando cambia el DOM
            }, [transactions, activeTab, isSidebarCollapsed, isMobileMenuOpen, isModalOpen]);

            const showToast = (message, type = 'success') => {
                setToast({ message, type });
            };

            const stats = useMemo(() => {
                const income = transactions.filter(t => t.type === 'income').reduce((acc, t) => acc + Number(t.amount), 0);
                const fixed = transactions.filter(t => t.type === 'fixed').reduce((acc, t) => acc + Number(t.amount), 0);
                const variable = transactions.filter(t => t.type === 'expense').reduce((acc, t) => acc + Number(t.amount), 0);
                const savings = transactions.filter(t => t.type === 'saving').reduce((acc, t) => acc + Number(t.amount), 0);
                const totalExpenses = fixed + variable;
                const balance = income - totalExpenses - savings;
                const savingsRate = income > 0 ? ((savings / income) * 100).toFixed(1) : 0;
                return { income, fixed, variable, savings, totalExpenses, balance, savingsRate };
            }, [transactions]);

            const handleAddTransaction = (e) => {
                e.preventDefault();
                if (!newTransaction.amount || !newTransaction.category) return;
                const item = { ...newTransaction, id: Date.now(), amount: Number(newTransaction.amount) };
                setTransactions(prev => [...prev, item]);
                setIsModalOpen(false);
                setNewTransaction({ type: 'expense', category: '', amount: '', description: '', date: new Date().toISOString().split('T')[0] });
                showToast("Registro guardado con éxito");
            };

            const handleDeleteTransaction = (id) => {
                setTransactions(prev => prev.filter(t => t.id !== id));
                showToast("Registro eliminado", "info");
            };

            const menuItems = [
                { id: 'dashboard', label: 'Dashboard', icon: 'layout-dashboard' },
                { id: 'income', label: 'Entradas', icon: 'arrow-up-circle' },
                { id: 'fixed', label: 'Gastos Fijos', icon: 'lock' },
                { id: 'expense', label: 'Variables', icon: 'receipt' },
                { id: 'saving', label: 'Ahorros', icon: 'piggy-bank' },
            ];

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* Sidebar Desktop */}
                    <aside className={`hidden md:flex flex-col bg-slate-900 text-white transition-all duration-500 relative ${isSidebarCollapsed ? 'w-20' : 'w-72'}`}>
                        <button onClick={() => setIsSidebarCollapsed(!isSidebarCollapsed)} className="absolute -right-3 top-10 bg-indigo-600 text-white rounded-full p-1.5 shadow-xl z-50">
                            <i data-lucide={isSidebarCollapsed ? "menu" : "chevron-left"} className="w-4 h-4"></i>
                        </button>

                        <div className={`p-8 mb-4 ${isSidebarCollapsed ? 'flex justify-center' : ''}`}>
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shrink-0">
                                    <i data-lucide="trending-up" className="w-6 h-6 text-white"></i>
                                </div>
                                {!isSidebarCollapsed && (
                                    <div className="overflow-hidden">
                                        <h1 className="text-xl font-bold whitespace-nowrap">FinanceFlow</h1>
                                        <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Local Pro</p>
                                    </div>
                                )}
                            </div>
                        </div>

                        <nav className="flex-1 px-4 space-y-2">
                            {menuItems.map((item) => (
                                <button key={item.id} onClick={() => setActiveTab(item.id)} className={`w-full flex items-center gap-4 p-3.5 rounded-2xl transition-all group relative ${activeTab === item.id ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-800 hover:text-white'} ${isSidebarCollapsed ? 'justify-center' : ''}`}>
                                    <i data-lucide={item.icon} className="w-5 h-5 shrink-0"></i>
                                    {!isSidebarCollapsed && <span className="font-semibold">{item.label}</span>}
                                </button>
                            ))}
                        </nav>

                        <div className="p-6">
                            <div className={`bg-slate-800/50 rounded-2xl border border-slate-700 ${isSidebarCollapsed ? 'p-3' : 'p-5'}`}>
                                <div className="flex items-center gap-3">
                                    <i data-lucide="wallet" className={`w-5 h-5 ${stats.balance >= 0 ? 'text-emerald-400' : 'text-rose-400'}`}></i>
                                    {!isSidebarCollapsed && <span className="text-lg font-black">${stats.balance.toLocaleString()}</span>}
                                </div>
                            </div>
                        </div>
                    </aside>

                    {/* Mobile Menu Overlay */}
                    {isMobileMenuOpen && (
                        <div className="fixed inset-0 z-[60] md:hidden bg-slate-900/95 backdrop-blur-lg p-8">
                            <div className="flex justify-between items-center mb-12 text-white">
                                <h1 className="text-2xl font-bold flex items-center gap-3"><i data-lucide="trending-up"></i> FinanceFlow</h1>
                                <button onClick={() => setIsMobileMenuOpen(false)}><i data-lucide="x" className="w-8 h-8"></i></button>
                            </div>
                            <nav className="space-y-4">
                                {menuItems.map((item) => (
                                    <button key={item.id} onClick={() => { setActiveTab(item.id); setIsMobileMenuOpen(false); }} className={`w-full flex items-center gap-6 p-5 rounded-3xl text-xl font-bold ${activeTab === item.id ? 'bg-indigo-600 text-white' : 'text-slate-400'}`}>
                                        <i data-lucide={item.icon}></i> {item.label}
                                    </button>
                                ))}
                            </nav>
                        </div>
                    )}

                    {/* Content */}
                    <main className="flex-1 flex flex-col min-w-0 overflow-hidden">
                        <header className="bg-white/80 backdrop-blur-md border-b border-slate-200 px-6 py-4 flex justify-between items-center shrink-0">
                            <div className="flex items-center gap-4">
                                <button onClick={() => setIsMobileMenuOpen(true)} className="md:hidden p-2 text-slate-600"><i data-lucide="menu"></i></button>
                                <div>
                                    <h2 className="text-lg md:text-2xl font-black text-slate-800 capitalize leading-tight">{activeTab}</h2>
                                    <p className="text-xs md:text-sm text-slate-500 font-medium">Panel de control</p>
                                </div>
                            </div>
                            <button onClick={() => setIsModalOpen(true)} className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-xl flex items-center gap-2 shadow-lg font-bold">
                                <i data-lucide="plus"></i> <span>Nuevo</span>
                            </button>
                        </header>

                        <div className="flex-1 overflow-y-auto p-4 md:p-8 custom-scrollbar">
                            <div className="max-w-7xl mx-auto space-y-8 animate-fade-in">
                                {activeTab === 'dashboard' ? (
                                    <Dashboard stats={stats} transactions={transactions} />
                                ) : (
                                    <TransactionView 
                                        title={menuItems.find(i => i.id === activeTab).label} 
                                        type={activeTab} 
                                        data={transactions.filter(t => t.type === activeTab)} 
                                        onDelete={handleDeleteTransaction}
                                    />
                                )}
                            </div>
                        </div>
                    </main>

                    {/* Modal */}
                    {isModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onClick={() => setIsModalOpen(false)}></div>
                            <div className="bg-white rounded-[2rem] p-8 w-full max-w-lg shadow-2xl relative">
                                <h3 className="text-2xl font-black text-slate-800 mb-8">Nueva Operación</h3>
                                <form onSubmit={handleAddTransaction} className="space-y-6">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="col-span-2 sm:col-span-1">
                                            <label className="block text-xs font-bold text-slate-400 uppercase mb-2">Tipo</label>
                                            <select value={newTransaction.type} onChange={(e) => setNewTransaction({...newTransaction, type: e.target.value})} className="w-full bg-slate-50 rounded-2xl border-none ring-1 ring-slate-200 p-4 font-semibold">
                                                <option value="income">Ingreso</option>
                                                <option value="fixed">Gasto Fijo</option>
                                                <option value="expense">Gasto Variable</option>
                                                <option value="saving">Ahorro</option>
                                            </select>
                                        </div>
                                        <div className="col-span-2 sm:col-span-1">
                                            <label className="block text-xs font-bold text-slate-400 uppercase mb-2">Monto ($)</label>
                                            <input type="number" required placeholder="0.00" value={newTransaction.amount} onChange={(e) => setNewTransaction({...newTransaction, amount: e.target.value})} className="w-full bg-slate-50 rounded-2xl border-none ring-1 ring-slate-200 p-4 font-bold text-indigo-600" />
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="col-span-2 sm:col-span-1">
                                            <label className="block text-xs font-bold text-slate-400 uppercase mb-2">Categoría</label>
                                            <input type="text" required placeholder="Eje: Super" value={newTransaction.category} onChange={(e) => setNewTransaction({...newTransaction, category: e.target.value})} className="w-full bg-slate-50 rounded-2xl border-none ring-1 ring-slate-200 p-4 font-semibold" />
                                        </div>
                                        <div className="col-span-2 sm:col-span-1">
                                            <label className="block text-xs font-bold text-slate-400 uppercase mb-2">Fecha</label>
                                            <input type="date" required value={newTransaction.date} onChange={(e) => setNewTransaction({...newTransaction, date: e.target.value})} className="w-full bg-slate-50 rounded-2xl border-none ring-1 ring-slate-200 p-4 font-semibold" />
                                        </div>
                                    </div>
                                    <button type="submit" className="w-full bg-indigo-600 text-white p-5 rounded-2xl font-bold shadow-xl">Registrar Movimiento</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
                </div>
            );
        }

        function Dashboard({ stats, transactions }) {
            return (
                <div className="space-y-8">
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                        <KPICard title="Ingresos" value={stats.income} color="emerald" iconName="arrow-up-circle" />
                        <KPICard title="Gastos" value={stats.totalExpenses} color="rose" iconName="arrow-down-circle" />
                        <KPICard title="Ahorro" value={stats.savings} color="purple" iconName="piggy-bank" />
                        <KPICard title="Ratio Ahorro" value={`${stats.savingsRate}%`} color="blue" iconName="pie-chart" />
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div className="lg:col-span-2 bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-sm">
                            <h3 className="text-xl font-black text-slate-800 uppercase tracking-tight mb-10">Presupuesto Mensual</h3>
                            <div className="space-y-8">
                                <PresupuestoBar label="Gastos Fijos" value={stats.fixed} total={stats.income} color="bg-blue-500" />
                                <PresupuestoBar label="Gastos Variables" value={stats.variable} total={stats.income} color="bg-orange-500" />
                                <PresupuestoBar label="Ahorros" value={stats.savings} total={stats.income} color="bg-indigo-500" />
                                <div className="pt-6 border-t border-slate-100 flex justify-between items-center text-sm font-bold text-slate-400">
                                    <span>BALANCE DISPONIBLE</span>
                                    <span className="text-2xl font-black text-indigo-600">${stats.balance.toLocaleString()}</span>
                                </div>
                            </div>
                        </div>

                        <div className="bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-sm flex flex-col h-[480px]">
                            <h3 className="text-xl font-black text-slate-800 uppercase tracking-tight mb-8">Movimientos</h3>
                            <div className="flex-1 space-y-4 overflow-y-auto pr-2 custom-scrollbar">
                                {transactions.length === 0 ? (
                                    <p className="text-center text-slate-300 mt-20">Sin actividad</p>
                                ) : (
                                    transactions.slice(-10).reverse().map(t => (
                                        <div key={t.id} className="flex items-center gap-4 p-4 rounded-3xl hover:bg-slate-50 border border-transparent hover:border-slate-100 group">
                                            <div className={`w-10 h-10 rounded-2xl flex items-center justify-center shrink-0 ${t.type === 'income' ? 'bg-emerald-100 text-emerald-600' : 'bg-slate-100 text-slate-600'}`}>
                                                <i data-lucide={t.type === 'income' ? 'plus' : 'arrow-down-circle'} className="w-5 h-5"></i>
                                            </div>
                                            <div className="flex-1 min-w-0">
                                                <p className="font-bold text-slate-800 truncate">{t.category}</p>
                                                <p className="text-[10px] text-slate-400 font-bold uppercase">{t.date}</p>
                                            </div>
                                            <p className={`font-black ${t.type === 'income' ? 'text-emerald-600' : 'text-slate-900'}`}>
                                                {t.type === 'income' ? '+' : '-'}${t.amount}
                                            </p>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function TransactionView({ title, data, type, onDelete }) {
            const total = data.reduce((acc, curr) => acc + curr.amount, 0);
            return (
                <div className="space-y-6">
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-10 gap-6">
                        <div>
                            <h3 className="text-3xl font-black text-slate-900 tracking-tight">{title}</h3>
                            <p className="text-slate-500 font-medium">Análisis detallado de tus {title.toLowerCase()}</p>
                        </div>
                        <div className="bg-white px-8 py-5 rounded-[2rem] border border-slate-200 text-right w-full sm:w-auto shadow-sm">
                            <p className="text-xs font-black text-slate-400 uppercase tracking-widest mb-1">Total</p>
                            <p className={`text-3xl font-black ${type === 'income' ? 'text-emerald-600' : 'text-slate-900'}`}>${total.toLocaleString()}</p>
                        </div>
                    </div>
                    <div className="bg-white rounded-[2.5rem] border border-slate-200 shadow-sm overflow-x-auto">
                        <table className="w-full text-left min-w-[600px]">
                            <thead className="bg-slate-50/50 text-slate-400 text-xs font-black uppercase">
                                <tr>
                                    <th className="px-8 py-6">Detalle</th>
                                    <th className="px-8 py-6">Fecha</th>
                                    <th className="px-8 py-6 text-right">Monto</th>
                                    <th className="px-8 py-6 w-20"></th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-50">
                                {data.map((item) => (
                                    <tr key={item.id} className="hover:bg-slate-50 group">
                                        <td className="px-8 py-6">
                                            <p className="font-bold text-slate-800 text-lg leading-tight">{item.category}</p>
                                            <p className="text-sm text-slate-400">{item.description || 'Sin nota'}</p>
                                        </td>
                                        <td className="px-8 py-6 font-bold text-slate-600">{item.date}</td>
                                        <td className={`px-8 py-6 text-right text-xl font-black ${type === 'income' ? 'text-emerald-600' : 'text-slate-900'}`}>${item.amount.toLocaleString()}</td>
                                        <td className="px-8 py-6 text-right">
                                            <button onClick={() => onDelete(item.id)} className="p-3 text-slate-300 hover:text-rose-500 hover:bg-rose-50 rounded-2xl transition-all opacity-0 group-hover:opacity-100">
                                                <i data-lucide="trash-2" className="w-5 h-5"></i>
                                            </button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
