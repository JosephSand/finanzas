<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FinanceFlow Pro | Control Contable Real</title>
    
    <!-- Configuración para Apple Web App -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FinanceFlow">
    
    <!-- Icono para Apple (apple-touch-icon.png debe estar en tu carpeta raíz) -->
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" href="apple-touch-icon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }
        
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white !important; }
            .print-card { 
                border: 1px solid #e2e8f0 !important; 
                box-shadow: none !important; 
                border-radius: 0 !important;
                padding: 20px !important;
            }
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .btn-delete {
            background-color: #fff1f2;
            color: #e11d48;
            border: 1px solid #fecdd3;
        }
        .btn-delete:hover {
            background-color: #ffe4e6;
            color: #be123c;
        }
        .btn-edit {
            background-color: #eef2ff;
            color: #4f46e5;
            border: 1px solid #c7d2fe;
        }
        .btn-edit:hover {
            background-color: #e0e7ff;
            color: #3730a3;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 text-left">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const Icon = ({ name, className = "w-5 h-5" }) => {
            useEffect(() => { lucide.createIcons(); });
            return <i data-lucide={name} className={className}></i>;
        };

        const Toast = ({ message, type, onClose }) => {
            useEffect(() => {
                const timer = setTimeout(onClose, 3000);
                return () => clearTimeout(timer);
            }, [onClose]);
            return (
                <div className="fixed bottom-6 right-6 z-[100] flex items-center gap-3 px-6 py-4 rounded-2xl shadow-2xl animate-in bg-slate-900 text-white border border-slate-700">
                    <Icon name={type === 'success' ? 'check-circle' : 'info'} className={type === 'success' ? 'text-emerald-400' : 'text-blue-400'} />
                    <span className="font-medium text-sm">{message}</span>
                </div>
            );
        };

        // --- APP PRINCIPAL ---

        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isSidebarCollapsed, setIsSidebarCollapsed] = useState(false);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [toast, setToast] = useState(null);
            const [isModalOpen, setIsModalOpen] = useState(false);
            
            const [editingId, setEditingId] = useState(null);
            const [formData, setFormData] = useState({
                type: 'expense', category: '', amount: '', date: new Date().toISOString().split('T')[0]
            });

            const [transactions, setTransactions] = useState(() => {
                const saved = localStorage.getItem('financeflow_real_v5');
                const lastReset = localStorage.getItem('financeflow_last_reset');
                const currentMonth = new Date().toISOString().slice(0, 7);
                
                let data = saved ? JSON.parse(saved) : [];

                if (lastReset !== currentMonth) {
                    data = data.filter(t => t.type === 'fixed').map(t => ({
                        ...t,
                        isPaid: false
                    }));
                    localStorage.setItem('financeflow_last_reset', currentMonth);
                }
                return data;
            });

            useEffect(() => {
                localStorage.setItem('financeflow_real_v5', JSON.stringify(transactions));
                lucide.createIcons();
            }, [transactions, activeTab, isSidebarCollapsed, isModalOpen]);

            const showToast = (message, type = 'success') => setToast({ message, type });

            const stats = useMemo(() => {
                const income = transactions.filter(t => t.type === 'income').reduce((acc, t) => acc + Number(t.amount), 0);
                const fixedItems = transactions.filter(t => t.type === 'fixed');
                const variable = transactions.filter(t => t.type === 'expense').reduce((acc, t) => acc + Number(t.amount), 0);
                const savings = transactions.filter(t => t.type === 'saving').reduce((acc, t) => acc + Number(t.amount), 0);

                const totalFixed = fixedItems.reduce((acc, t) => acc + Number(t.amount), 0);
                const paidFixed = fixedItems.filter(t => t.isPaid).reduce((acc, t) => acc + Number(t.amount), 0);
                const pendingFixed = totalFixed - paidFixed;
                
                const realBalance = income - (paidFixed + variable + savings);
                const projectedBalance = income - (totalFixed + variable + savings);

                // Cálculo de Gasto Diario
                const today = new Date();
                const lastDayOfMonth = new Date(today.getFullYear(), today.getMonth() + 1, 0).getDate();
                const remainingDays = lastDayOfMonth - today.getDate() + 1;
                const dailyBudget = realBalance > 0 ? (realBalance / remainingDays) : 0;

                return { 
                    income, totalFixed, paidFixed, pendingFixed, 
                    variable, savings, realBalance, projectedBalance, 
                    dailyBudget, remainingDays 
                };
            }, [transactions]);

            const handleOpenModal = () => {
                setEditingId(null);
                setFormData({ type: 'expense', category: '', amount: '', date: new Date().toISOString().split('T')[0] });
                setIsModalOpen(true);
            };

            const handleEdit = (item) => {
                setEditingId(item.id);
                setFormData({
                    type: item.type,
                    category: item.category,
                    amount: item.amount.toString(),
                    date: item.date
                });
                setIsModalOpen(true);
            };

            const handleSave = (e) => {
                e.preventDefault();
                if (!formData.amount || !formData.category) return;

                if (editingId) {
                    setTransactions(prev => prev.map(t => 
                        t.id === editingId ? { ...t, ...formData, amount: Number(formData.amount) } : t
                    ));
                    showToast("Registro actualizado");
                } else {
                    const item = { 
                        ...formData, 
                        id: Date.now(), 
                        amount: Number(formData.amount),
                        isPaid: formData.type === 'income' 
                    };
                    setTransactions(prev => [...prev, item]);
                    showToast("Registro guardado");
                }
                
                setIsModalOpen(false);
                setEditingId(null);
            };

            const handleDelete = (id) => {
                setTransactions(prev => prev.filter(t => t.id !== id));
                showToast("Registro borrado correctamente", "info");
            };

            const togglePaid = (id) => {
                setTransactions(prev => prev.map(t => t.id === id ? { ...t, isPaid: !t.isPaid } : t));
            };

            const menuItems = [
                { id: 'dashboard', label: 'Dashboard', icon: 'layout-dashboard' },
                { id: 'income', label: 'Ingresos', icon: 'trending-up' },
                { id: 'fixed', label: 'Gastos Fijos', icon: 'calendar-check' },
                { id: 'expense', label: 'Variables', icon: 'shopping-bag' },
                { id: 'saving', label: 'Ahorros', icon: 'piggy-bank' },
                { id: 'report', label: 'Cierre de Mes', icon: 'file-text' },
            ];

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* Sidebar */}
                    <aside className={`no-print hidden md:flex flex-col bg-slate-950 text-white transition-all duration-300 relative ${isSidebarCollapsed ? 'w-20' : 'w-72'}`}>
                        <button onClick={() => setIsSidebarCollapsed(!isSidebarCollapsed)} className="absolute -right-3 top-10 bg-indigo-600 text-white rounded-full p-1.5 shadow-xl z-50">
                            <Icon name={isSidebarCollapsed ? "chevron-right" : "chevron-left"} className="w-4 h-4" />
                        </button>
                        <div className="p-8 mb-4 flex items-center gap-3 text-left">
                            <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shrink-0 shadow-lg"><Icon name="briefcase" className="text-white w-5 h-5" /></div>
                            {!isSidebarCollapsed && <h1 className="text-lg font-black tracking-tight uppercase leading-none">FinanceFlow<br/><span className="text-[9px] text-slate-500 tracking-[0.2em]">CONTROL DIARIO</span></h1>}
                        </div>
                        <nav className="flex-1 px-4 space-y-1">
                            {menuItems.map(item => (
                                <button key={item.id} onClick={() => setActiveTab(item.id)} className={`w-full flex items-center gap-4 p-4 rounded-2xl transition-all ${activeTab === item.id ? 'bg-indigo-600 text-white shadow-xl' : 'text-slate-500 hover:text-white hover:bg-slate-900'} ${isSidebarCollapsed ? 'justify-center' : ''}`}>
                                    <Icon name={item.icon} /> {!isSidebarCollapsed && <span className="font-bold text-xs uppercase tracking-wider">{item.label}</span>}
                                </button>
                            ))}
                        </nav>
                        <div className="p-6">
                            <div className={`bg-slate-900 rounded-2xl p-4 border border-slate-800 ${isSidebarCollapsed ? 'p-2 flex justify-center' : ''}`}>
                                <Icon name="activity" className={stats.realBalance >= 0 ? 'text-emerald-400' : 'text-rose-400'} />
                                {!isSidebarCollapsed && <p className="mt-2 text-[9px] font-black text-slate-500 uppercase">Saldo Real</p>}
                                {!isSidebarCollapsed && <p className="text-xl font-black text-white">${stats.realBalance.toLocaleString()}</p>}
                            </div>
                        </div>
                    </aside>

                    {/* Menú Móvil */}
                    {isMobileMenuOpen && (
                        <div className="fixed inset-0 z-[60] md:hidden bg-slate-950 p-8 animate-in text-white text-left text-left">
                            <div className="flex justify-between items-center mb-12 text-left"><h1 className="text-2xl font-black uppercase tracking-tighter">Menu</h1><button onClick={() => setIsMobileMenuOpen(false)}><Icon name="x" className="w-8 h-8" /></button></div>
                            <nav className="space-y-4">
                                {menuItems.map(item => (
                                    <button key={item.id} onClick={() => { setActiveTab(item.id); setIsMobileMenuOpen(false); }} className={`w-full flex items-center gap-6 p-5 rounded-3xl text-lg font-black uppercase ${activeTab === item.id ? 'bg-indigo-600' : 'text-slate-600'}`}>
                                        <Icon name={item.icon} className="w-6 h-6" /> {item.label}
                                    </button>
                                ))}
                            </nav>
                        </div>
                    )}

                    {/* Contenido Principal */}
                    <main className="flex-1 flex flex-col min-w-0 overflow-hidden bg-slate-50 text-left">
                        <header className="no-print bg-white/80 backdrop-blur-md border-b border-slate-200 px-6 py-4 flex justify-between items-center shrink-0 z-40">
                            <div className="flex items-center gap-4">
                                <button onClick={() => setIsMobileMenuOpen(true)} className="md:hidden p-2 text-slate-600"><Icon name="menu" /></button>
                                <h2 className="text-xs font-black text-slate-400 uppercase tracking-[0.2em]">{menuItems.find(i => i.id === activeTab).label}</h2>
                            </div>
                            <button onClick={handleOpenModal} className="bg-indigo-600 text-white px-5 py-2.5 rounded-xl flex items-center gap-2 text-xs font-bold shadow-lg shadow-indigo-100 transition-all active:scale-95"><Icon name="plus" className="w-4 h-4" /> <span>Añadir</span></button>
                        </header>

                        <div className="flex-1 overflow-y-auto p-4 md:p-8 custom-scrollbar">
                            <div className="max-w-5xl mx-auto">
                                {activeTab === 'dashboard' && (
                                    <Dashboard 
                                        stats={stats} 
                                        transactions={transactions} 
                                        onEdit={handleEdit} 
                                        onDelete={handleDelete} 
                                        onToggle={togglePaid} 
                                    />
                                )}
                                {activeTab !== 'dashboard' && activeTab !== 'report' && (
                                    <DataList 
                                        title={menuItems.find(i => i.id === activeTab).label} 
                                        data={transactions.filter(t => t.type === activeTab)} 
                                        isFixed={activeTab === 'fixed'}
                                        onEdit={handleEdit} 
                                        onDelete={handleDelete} 
                                        onToggle={togglePaid}
                                    />
                                )}
                                {activeTab === 'report' && <ReportView stats={stats} transactions={transactions} />}
                            </div>
                        </div>
                    </main>

                    {/* Modal */}
                    {isModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={() => setIsModalOpen(false)}></div>
                            <div className="bg-white rounded-[2rem] p-8 w-full max-w-lg shadow-2xl relative animate-in border border-slate-100 text-left">
                                <h3 className="text-xl font-black text-slate-800 mb-6 uppercase tracking-tight text-left">{editingId ? 'Editar Registro' : 'Nueva Operación'}</h3>
                                <form onSubmit={handleSave} className="space-y-5">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="col-span-2 sm:col-span-1 text-left">
                                            <label className="block text-[10px] font-black text-slate-400 uppercase mb-2">Tipo</label>
                                            <select value={formData.type} onChange={(e) => setFormData({...formData, type: e.target.value})} className="w-full bg-slate-50 rounded-xl border-none ring-1 ring-slate-200 p-4 font-bold text-slate-700 outline-none focus:ring-2 focus:ring-indigo-600">
                                                <option value="income">Ingreso</option>
                                                <option value="fixed">Gasto Fijo (Mensual)</option>
                                                <option value="expense">Gasto Variable</option>
                                                <option value="saving">Ahorro</option>
                                            </select>
                                        </div>
                                        <div className="col-span-2 sm:col-span-1 text-left">
                                            <label className="block text-[10px] font-black text-slate-400 uppercase mb-2 text-left">Monto ($)</label>
                                            <input type="number" step="0.01" required placeholder="0.00" value={formData.amount} onChange={(e) => setFormData({...formData, amount: e.target.value})} className="w-full bg-slate-50 rounded-xl border-none ring-1 ring-slate-200 p-4 font-black text-lg text-indigo-600 outline-none focus:ring-2 focus:ring-indigo-600" />
                                        </div>
                                    </div>
                                    <div className="col-span-2 text-left">
                                        <label className="block text-[10px] font-black text-slate-400 uppercase mb-2">Concepto / Nombre</label>
                                        <input type="text" required placeholder="Ej: Renta, Sueldo, Super..." value={formData.category} onChange={(e) => setFormData({...formData, category: e.target.value})} className="w-full bg-slate-50 rounded-xl border-none ring-1 ring-slate-200 p-4 font-bold outline-none focus:ring-2 focus:ring-indigo-600" />
                                    </div>
                                    <button type="submit" className="w-full bg-indigo-600 text-white p-5 rounded-xl font-black text-sm uppercase tracking-widest shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition-all active:scale-95">
                                        {editingId ? 'Guardar Cambios' : 'Confirmar e Insertar'}
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
                </div>
            );
        }

        // --- COMPONENTES AUXILIARES ---

        function Dashboard({ stats, transactions, onEdit, onDelete, onToggle }) {
            const fixedData = transactions.filter(t => t.type === 'fixed');
            return (
                <div className="space-y-8 animate-in text-left">
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                        <KPICard title="Presupuesto Diario" value={stats.dailyBudget} color="slate" icon="zap" subtitle={`Para los próximos ${stats.remainingDays} días`} />
                        <KPICard title="Saldo Real" value={stats.realBalance} color="emerald" icon="wallet" />
                        <KPICard title="Ingresos" value={stats.income} color="indigo" icon="arrow-up-right" />
                        <KPICard title="Ahorro" value={stats.savings} color="purple" icon="piggy-bank" />
                    </div>
                    
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div className="lg:col-span-2 bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-sm text-left overflow-hidden">
                            <h3 className="text-xs font-black text-slate-400 uppercase tracking-[0.2em] mb-8 text-left">Gestión de Pagos Fijos</h3>
                            <div className="space-y-4">
                                {fixedData.map(t => (
                                    <div key={t.id} className="flex flex-col sm:flex-row sm:items-center justify-between p-5 bg-slate-50 rounded-2xl border border-slate-100 transition-all hover:border-indigo-100 gap-4">
                                        <div className="flex items-center gap-4">
                                            <button onClick={() => onToggle(t.id)} className={`w-11 h-11 rounded-2xl border-2 flex items-center justify-center transition-all ${t.isPaid ? 'bg-emerald-500 border-emerald-500 text-white shadow-lg' : 'bg-white border-slate-200 text-transparent'}`}>
                                                <Icon name="check" className="w-5 h-5" />
                                            </button>
                                            <span className={`font-bold text-sm ${t.isPaid ? 'text-slate-400 line-through' : 'text-slate-700'}`}>{t.category}</span>
                                        </div>
                                        <div className="flex items-center justify-between sm:justify-end gap-6">
                                            <span className="font-black text-sm text-slate-900">${t.amount.toLocaleString()}</span>
                                            <div className="flex gap-2 no-print">
                                                <button onClick={() => onEdit(t)} title="Editar" className="btn-edit p-2.5 rounded-xl transition-all"><Icon name="edit-3" className="w-5 h-5" /></button>
                                                <button onClick={() => onDelete(t.id)} title="Eliminar definitivamente" className="btn-delete p-2.5 rounded-xl transition-all"><Icon name="trash-2" className="w-5 h-5" /></button>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                                {fixedData.length === 0 && <p className="text-slate-300 text-sm italic text-center py-10">Sin gastos fijos configurados.</p>}
                            </div>
                        </div>
                        <div className="bg-white p-8 rounded-[2rem] border border-slate-200 shadow-sm flex flex-col text-left">
                            <h3 className="text-xs font-black text-slate-400 uppercase tracking-[0.2em] mb-6 text-left text-left">Distribución del Capital</h3>
                            <Metric label="Gasto Fijo" value={stats.totalFixed} total={stats.income} color="bg-indigo-500" />
                            <Metric label="Gasto Variable" value={stats.variable} total={stats.income} color="bg-orange-500" />
                            <Metric label="Meta Ahorro" value={stats.savings} total={stats.income} color="bg-purple-500" />
                            <div className="mt-auto pt-6 border-t border-slate-50">
                                <p className="text-[10px] font-black text-slate-400 uppercase mb-2">Comprometido No Pagado</p>
                                <p className="text-xl font-black text-amber-500">${stats.pendingFixed.toLocaleString()}</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function DataList({ title, data, isFixed, onEdit, onDelete, onToggle }) {
            return (
                <div className="animate-in space-y-6 text-left">
                    <h3 className="text-2xl font-black tracking-tight text-left">{title}</h3>
                    <div className="bg-white rounded-[2.5rem] border border-slate-200 shadow-sm overflow-x-auto text-left">
                        <table className="w-full text-left min-w-[600px]">
                            <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-100">
                                <tr>
                                    {isFixed && <th className="px-8 py-5 w-24 text-center">Estado</th>}
                                    <th className="px-8 py-5">Concepto</th>
                                    <th className="px-8 py-5 text-center">Fecha</th>
                                    <th className="px-8 py-5 text-right">Monto</th>
                                    <th className="px-8 py-5 text-center w-48">Gestión</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100 text-sm">
                                {data.map(t => (
                                    <tr key={t.id} className={`hover:bg-slate-50/80 transition-all ${isFixed && t.isPaid ? 'bg-slate-50/30' : ''}`}>
                                        {isFixed && (
                                            <td className="px-8 py-5 text-center">
                                                <button onClick={() => onToggle(t.id)} className={`w-10 h-10 rounded-2xl border-2 flex items-center justify-center transition-all ${t.isPaid ? 'bg-emerald-500 border-emerald-500 text-white shadow-lg' : 'border-slate-200 text-transparent hover:border-emerald-300'}`}>
                                                    <Icon name="check" className="w-5 h-5" />
                                                </button>
                                            </td>
                                        )}
                                        <td className={`px-8 py-5 font-bold ${isFixed && t.isPaid ? 'text-slate-400 line-through' : 'text-slate-800 text-left'}`}>{t.category}</td>
                                        <td className="px-8 py-5 text-center text-slate-500 font-medium">{t.date}</td>
                                        <td className="px-8 py-5 text-right font-black text-slate-900">${t.amount.toLocaleString()}</td>
                                        <td className="px-8 py-5 text-center">
                                            <div className="flex justify-center gap-3">
                                                <button onClick={() => onEdit(t)} title="Editar" className="btn-edit p-2.5 rounded-xl transition-all shadow-sm">
                                                    <Icon name="edit-3" className="w-4 h-4" />
                                                </button>
                                                <button onClick={() => onDelete(t.id)} title="Borrar Registro" className="btn-delete p-2.5 rounded-xl transition-all shadow-sm">
                                                    <Icon name="trash-2" className="w-4 h-4" />
                                                </button>
                                            </div>
                                        </td>
                                    </tr>
                                ))}
                                {data.length === 0 && <tr><td colSpan="5" className="px-8 py-20 text-center text-slate-300 italic font-medium">Bandeja vacía. Haz clic en "Añadir" para registrar datos.</td></tr>}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        function ReportView({ stats, transactions }) {
            const currentMonth = new Date().toLocaleDateString('es-ES', { month: 'long', year: 'numeric' });
            return (
                <div className="animate-in pb-12 text-left">
                    <div className="print-card bg-white p-12 md:p-20 rounded-[3rem] border border-slate-200 shadow-xl relative text-left">
                        <div className="absolute top-0 left-0 w-full h-3 bg-indigo-600 no-print text-left"></div>
                        <div className="flex flex-col md:flex-row justify-between items-start border-b-2 border-slate-100 pb-10 mb-12 text-left gap-6">
                            <div><h1 className="text-4xl font-black text-slate-950 uppercase tracking-tighter leading-tight">Cierre de Periodo Mensual</h1><p className="text-lg font-bold text-indigo-600 uppercase tracking-[0.2em] mt-2">{currentMonth}</p></div>
                            <div className="text-left md:text-right flex flex-col gap-1">
                                <span className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Folio de Control</span>
                                <p className="text-sm font-bold text-slate-900">ID-{Date.now().toString().slice(-8)}</p>
                                <span className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mt-2">Emitido</span>
                                <p className="text-sm font-bold text-slate-900 text-left">{new Date().toLocaleDateString()}</p>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8 mb-16 text-left">
                            <div className="p-8 bg-emerald-50 rounded-[2.5rem] border border-emerald-100"><p className="text-[10px] font-black uppercase text-emerald-600 mb-2">Ingresos Consolidados</p><p className="text-3xl font-black text-emerald-700">${stats.income.toLocaleString()}</p></div>
                            <div className="p-8 bg-rose-50 rounded-[2.5rem] border border-rose-100"><p className="text-[10px] font-black uppercase text-rose-600 mb-2">Egresos Totales</p><p className="text-3xl font-black text-rose-700">${(stats.totalFixed + stats.variable + stats.savings).toLocaleString()}</p></div>
                            <div className="p-8 bg-slate-950 text-white rounded-[2.5rem] shadow-2xl shadow-indigo-900/20"><p className="text-[10px] font-black uppercase text-slate-400 mb-2 tracking-widest">Balance Líquido Real</p><p className="text-3xl font-black">${stats.realBalance.toLocaleString()}</p></div>
                        </div>

                        <div className="space-y-12 text-left">
                            <ReportItem title="Entradas de Capital" items={transactions.filter(t => t.type === 'income')} />
                            <ReportItem title="Gastos Fijos de Estructura" items={transactions.filter(t => t.type === 'fixed')} isFixed />
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-12 text-left">
                                <ReportItem title="Gastos Variables" items={transactions.filter(t => t.type === 'expense')} />
                                <ReportItem title="Ahorro Realizado" items={transactions.filter(t => t.type === 'saving')} />
                            </div>
                        </div>

                        <div className="mt-20 pt-10 border-t border-slate-100 text-center md:text-left">
                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mb-4">Certificación Local de Datos</p>
                            <p className="text-[9px] text-slate-400 leading-relaxed italic max-w-2xl text-left">Este informe refleja fielmente los movimientos contables registrados por el usuario. Los gastos variables se purgan el primero de cada mes para mantener la eficiencia del sistema, mientras que los fijos persisten.</p>
                        </div>
                    </div>
                </div>
            );
        }

        function ReportItem({ title, items, isFixed }) {
            const total = items.reduce((acc, t) => acc + t.amount, 0);
            return (
                <section className="text-left text-left">
                    <h5 className="text-[10px] font-black text-slate-900 uppercase border-b-2 border-slate-100 pb-3 mb-6 flex justify-between tracking-[0.2em] text-left">
                        <span>{title}</span>
                        <span className="text-indigo-600 font-black">${total.toLocaleString()}</span>
                    </h5>
                    <div className="space-y-3 text-left">
                        {items.map(item => (
                            <div key={item.id} className="flex justify-between text-xs py-1 border-b border-slate-50 text-left">
                                <span className={`font-semibold ${isFixed && !item.isPaid ? 'text-rose-500' : 'text-slate-600'}`}>{item.category} {isFixed && <span className="text-[9px] font-black ml-2">[{item.isPaid ? 'PAGADO' : 'PENDIENTE'}]</span>}</span>
                                <span className="font-black text-slate-900">${item.amount.toLocaleString()}</span>
                            </div>
                        ))}
                    </div>
                </section>
            );
        }

        function KPICard({ title, value, color, icon, subtitle }) {
            const colors = { 
                slate: "bg-slate-100 text-slate-900 border-slate-200 shadow-slate-100",
                indigo: "bg-indigo-50 text-indigo-600 border-indigo-100 shadow-indigo-100", 
                emerald: "bg-emerald-50 text-emerald-600 border-emerald-100 shadow-emerald-100", 
                amber: "bg-amber-50 text-amber-600 border-amber-100 shadow-amber-100", 
                purple: "bg-purple-50 text-purple-600 border-purple-100 shadow-purple-100" 
            };
            return (
                <div className="bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm flex flex-col gap-5 transition-all hover:border-indigo-300 text-left">
                    <div className={`w-14 h-14 rounded-2xl flex items-center justify-center border shrink-0 ${colors[color]} shadow-sm`}><Icon name={icon} className="w-6 h-6" /></div>
                    <div className="text-left text-left">
                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none mb-1 text-left">{title}</p>
                        <p className="text-2xl font-black text-slate-900 text-left tracking-tight">${value.toLocaleString()}</p>
                        {subtitle && <p className="text-[9px] font-bold text-slate-400 mt-2 uppercase tracking-tighter">{subtitle}</p>}
                    </div>
                </div>
            );
        }

        function Metric({ label, value, total, color }) {
            const p = total > 0 ? Math.min((value / total) * 100, 100) : 0;
            return (
                <div className="space-y-3 mb-8 last:mb-0 text-left">
                    <div className="flex justify-between text-[10px] font-black text-slate-500 uppercase tracking-tighter"><span>{label}</span><span>{p.toFixed(0)}%</span></div>
                    <div className="h-3 bg-slate-100 rounded-full overflow-hidden p-0.5"><div className={`h-full rounded-full ${color} transition-all duration-1000 shadow-sm`} style={{ width: `${p}%` }}></div></div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
